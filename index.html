<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

   <link rel="stylesheet" href="hw2.css">
</head>

<body>

<div class="container">
    <h3>To Get Enroll in Courses</h3>
    <h2>Register Here!</h2>

    <form>
      <label for="fname">First Name:</label>
  <input type="text" id="fname" placeholder="Your first name">
 <label for="lname">Last Name:</label>
     <input type="text" id="lname" placeholder="Your last name">
<label for="email">Email:</label>
        <input type="email" id="email" placeholder="abc@gmail.com" required>        
    <label for="phone">Phone Number:</label>
<input type="tel" id="phone" placeholder="Enter phone number">
<label for="aadhaar">Aadhaar Number:</label><br>
<input type="tel" id="aadhaar" name="aadhaar"  maxlength="12" placeholder="Enter 12-digit Aadhaar number" required>
<label for="dob">Date of Birth:</label>
        <input type="date" id="dob" required>
<label>Gender:</label>
        <div class="gender">
            <input type="radio" id="male" name="gender"> <label for="male">Male</label>
  <input type="radio" id="female" name="gender">
<label for="female">Female</label>
        </div>
<label for="address">Address:</label>
    <textarea id="address" rows="3"></textarea>
<label for="course">Select Course:</label>
 <select id="course">
 <option>Web Development</option>
 <option>Data Science</option>
            <option>Machine Learning</option>
        </select>
 <label for="password">Set Password:</label>
        <input type="password" id="password" placeholder="(6 to 8) characters" required>
<label for="confirm">Re-enter Password:</label>
<input type="password" id="confirm">
<button onclick="handleClick()">Register</button>
    </form>
</div>
<!-- <script src="javascript.js"></script> -->
</body>
</html>
